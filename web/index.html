<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Multi-tenant college scheduling platform">

  <!-- iOS PWA: hides Safari UI when launched from home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Schedulify">

  <!-- iOS home screen icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Theme color for browser address bar (Android Chrome) -->
  <meta name="theme-color" content="#0D0D14">
  <meta name="msapplication-navbutton-color" content="#0D0D14">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/assets/images/App_icon.svg"/>

  <title>Schedulify</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Detect: iOS Safari, NOT already installed as PWA.
    (function() {
      var ua = navigator.userAgent;
      var isIos = /iphone|ipad|ipod/i.test(ua) && !window.MSStream;
      var isSafari = /safari/i.test(ua) && !/chrome|crios|fxios/i.test(ua);
      var isStandalone = window.navigator.standalone === true;
      window._schedulifyShowPwaPrompt = isIos && isSafari && !isStandalone;
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
